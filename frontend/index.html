<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Editor</title>
<link rel="stylesheet" href="src/style.css">
<script src="src/app.js"></script>
</head>
<body>
<div id="app">
    <!-- Editor view (always visible, no start page) -->
    <div id="editor-view" style="display:flex;flex-direction:column;height:100vh">
        <!-- Top bar -->
        <div id="editor-topbar" style="display:flex;align-items:center;padding:8px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);gap:10px">
            <span id="editor-icon" style="font-size:20px">🏢</span>
            <span id="editor-filename" style="font-weight:600;flex:1;font-size:14px"></span>
            <span id="editor-modified" style="font-size:11px;color:var(--accent-yellow);display:none">✏️ Modified</span>
            <button class="btn btn-sm" id="btn-new-company" title="New company">📄 New</button>
            <button class="btn btn-sm" id="btn-open-file" title="Open .comp file">📂 Open</button>
            <div style="border-left:1px solid var(--border);height:24px"></div>
            <button class="btn btn-sm btn-primary" id="btn-save">💾 Save</button>
            <div style="border-left:1px solid var(--border);height:24px"></div>
            <button class="btn btn-sm" id="btn-add-email" title="Add email">✉️ Add Email</button>
            <button class="btn btn-sm" id="btn-add-phone" title="Add phone">📞 Add Phone</button>
            <button class="btn btn-sm btn-primary" id="btn-add-contact" title="Add contact person">👤 Add Contact</button>
        </div>

        <!-- Editor content -->
        <div id="editor-content" style="flex:1;overflow-y:auto;padding:16px"></div>
    </div>
</div>

<pre id="debug-log" style="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#0f0;font-size:11px;padding:4px 8px;max-height:80px;overflow-y:auto;z-index:9999;margin:0;white-space:pre-wrap"></pre>
<script src="src/main.js"></script>
</body>
</html>
